<!DOCTYPE html>
<html>
<head>
    <title>Voxel DDA</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #setup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            color: #fff;
            z-index: 1000;
        }
        #setup-screen::before,
        #setup-screen::after {
            content: '';
            flex: 1;
            min-height: 20px;
        }
        #setup-screen.hidden {
            display: none;
        }
        h1 {
            margin-bottom: 6px;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: #888;
            margin-bottom: 14px;
        }
        .quality-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .quality-option {
            display: flex;
            align-items: flex-start;
            padding: 9px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            border: 2px solid transparent;
        }
        .quality-option:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        .quality-option.selected {
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }
        .quality-option input[type="radio"] {
            display: none;
        }
        .radio-circle {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-radius: 50%;
            margin-right: 15px;
            position: relative;
            flex-shrink: 0;
        }
        .quality-option.selected .radio-circle {
            border-color: #4fc3f7;
        }
        .quality-option.selected .radio-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #4fc3f7;
            border-radius: 50%;
        }
        .option-details {
            flex: 1;
        }
        .option-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .option-description {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .option-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.8rem;
            color: #666;
        }
        .spec {
            background: rgba(255,255,255,0.05);
            padding: 3px 8px;
            border-radius: 4px;
        }
        #start-btn {
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.4);
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(79, 195, 247, 0.6);
        }
        #start-btn:active {
            transform: scale(0.98);
        }
        #canvas-container {
            width: 100%;
            height: 100vh;
        }
        #back-btn {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 25px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: rgba(79, 195, 247, 0.8);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            z-index: 100;
        }
        #back-btn:hover {
            background: rgba(79, 195, 247, 1);
            transform: translateX(-50%) scale(1.05);
        }
        #back-btn:active {
            transform: translateX(-50%) scale(0.98);
        }
        #fps-counter {
            position: fixed;
            top: 12px;
            right: 15px;
            color: #fff;
            font-size: 0.85rem;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        #custom-sliders {
            display: none;
            width: 100%;
            max-width: 500px;
            margin-bottom: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            box-sizing: border-box;
        }
        #custom-sliders.visible {
            display: block;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #ccc;
        }
        .slider-row:last-child {
            margin-bottom: 0;
        }
        .slider-label {
            width: 130px;
            flex-shrink: 0;
        }
        .slider-row input[type="range"] {
            flex: 1;
            accent-color: #4fc3f7;
        }
        .slider-row select {
            flex: 1;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.85rem;
        }
        .slider-value {
            width: 36px;
            text-align: right;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        #custom-panel {
            position: fixed;
            top: 50px;
            right: 15px;
            background: rgba(0,0,0,0.82);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.8rem;
            z-index: 100;
            min-width: 240px;
        }
        #custom-panel-header {
            padding: 7px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            user-select: none;
        }
        #custom-panel-toggle {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0;
        }
        #custom-panel-body {
            padding: 10px 12px;
        }
        #custom-panel-body.collapsed {
            display: none;
        }
        #custom-panel .slider-row {
            margin-bottom: 8px;
        }
        #custom-panel .slider-label {
            width: 110px;
        }
        #custom-apply {
            width: 100%;
            margin-top: 8px;
            padding: 7px;
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
        #custom-apply:hover {
            filter: brightness(1.15);
        }
    </style>
</head>
<body>
<div id="fps-counter">-- FPS</div>
<div id="setup-screen">
    <h1>Voxel DDA Demo</h1>
    <p class="subtitle">Select your preferred quality settings</p>
    
    <div class="quality-options">
        <label class="quality-option selected" data-preset="low">
            <input type="radio" name="quality" value="low" checked>
            <div class="radio-circle"></div>
            <div class="option-details">
                <div class="option-name">Low Quality</div>
                <div class="option-description">Best performance for mobile devices</div>
                <div class="option-specs">
                    <span class="spec">8 spheres</span>
                    <span class="spec">1 light</span>
                    <span class="spec">64³ voxels</span>
                    <span class="spec">Short shadows</span>
                </div>
            </div>
        </label>
        
        <label class="quality-option" data-preset="medium">
            <input type="radio" name="quality" value="medium">
            <div class="radio-circle"></div>
            <div class="option-details">
                <div class="option-name">Medium Quality</div>
                <div class="option-description">Balanced performance and visuals</div>
                <div class="option-specs">
                    <span class="spec">32 spheres</span>
                    <span class="spec">1 light</span>
                    <span class="spec">96³ voxels</span>
                    <span class="spec">Short shadows</span>
                </div>
            </div>
        </label>
        
        <label class="quality-option" data-preset="high">
            <input type="radio" name="quality" value="high">
            <div class="radio-circle"></div>
            <div class="option-details">
                <div class="option-name">High Quality</div>
                <div class="option-description">Best visuals for powerful devices</div>
                <div class="option-specs">
                    <span class="spec">128 spheres</span>
                    <span class="spec">3 lights</span>
                    <span class="spec">320×200×200 voxels</span>
                    <span class="spec">Full shadows</span>
                </div>
            </div>
        </label>

        <label class="quality-option" data-preset="custom">
            <input type="radio" name="quality" value="custom">
            <div class="radio-circle"></div>
            <div class="option-details">
                <div class="option-name">Custom</div>
                <div class="option-description">Tune every parameter to isolate performance</div>
                <div class="option-specs">
                    <span class="spec">Adjustable</span>
                </div>
            </div>
        </label>
    </div>

    <div id="custom-sliders">
        <div class="slider-row">
            <span class="slider-label">Spheres</span>
            <input type="range" id="s-entities" min="1" max="256" step="1" value="128">
            <span class="slider-value" id="v-entities">128</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">FOV</span>
            <input type="range" id="s-fov" min="30" max="120" step="1" value="80">
            <span class="slider-value" id="v-fov">80</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">Radius Min</span>
            <input type="range" id="s-radius-min" min="4" max="32" step="1" value="8">
            <span class="slider-value" id="v-radius-min">8</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">Radius Max</span>
            <input type="range" id="s-radius-max" min="4" max="32" step="1" value="16">
            <span class="slider-value" id="v-radius-max">16</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">Lights</span>
            <input type="range" id="s-lights" min="1" max="10" step="1" value="3">
            <span class="slider-value" id="v-lights">3</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">Grid W</span>
            <input type="range" id="s-w" min="32" max="512" step="8" value="320">
            <span class="slider-value" id="v-w">320</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">Grid H</span>
            <input type="range" id="s-h" min="32" max="512" step="8" value="200">
            <span class="slider-value" id="v-h">200</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">Grid D</span>
            <input type="range" id="s-d" min="32" max="512" step="8" value="200">
            <span class="slider-value" id="v-d">200</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">Shadow Distance</span>
            <input type="range" id="s-shadow-dist" min="16" max="256" step="8" value="128">
            <span class="slider-value" id="v-shadow-dist">128</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">DPR cap</span>
            <input type="range" id="s-dpr" min="1" max="2" step="0.25" value="1">
            <span class="slider-value" id="v-dpr">1</span>
        </div>
        <div class="slider-row">
            <span class="slider-label">PCF Taps</span>
            <select id="s-pcf">
                <option value="1">1 (fast)</option>
                <option value="5" selected>5 (quality)</option>
            </select>
        </div>
    </div>

    <button id="start-btn">Start Demo</button>
</div>

<div id="canvas-container">
    <button id="back-btn">Change Quality</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.170.0/build/three.module.js" } }
</script>

<script type="module">
    const DEFAULT_CUSTOM = {
        numEntities: 128, fov: 80, entityRadiusMin: 8, entityRadiusMax: 16, nLights: 3,
        w: 320, h: 200, d: 200,
        shadowCastDistance: 128,
        maxDpr: 1,
        shadowPcfTaps: 5
    };

    // Check if we have a quality preset in the URL hash
    const urlPreset = window.location.hash.slice(1); // Remove the #
    const validPresets = ['low', 'medium', 'high', 'custom'];
    
    if (urlPreset && validPresets.includes(urlPreset)) {
        // We have a valid preset, hide setup screen and start demo
        document.getElementById('setup-screen').classList.add('hidden');
        
        // Demo overlay — only shown in custom mode
        if (urlPreset === 'custom') {
            const stored = sessionStorage.getItem('customSettings');
            const s = stored ? JSON.parse(stored) : DEFAULT_CUSTOM;

            const panel = document.createElement('div');
            panel.id = 'custom-panel';
            panel.innerHTML = `
                <div id="custom-panel-header">
                    Custom Settings
                    <button id="custom-panel-toggle">▾</button>
                </div>
                <div id="custom-panel-body">
                    <div class="slider-row">
                        <span class="slider-label">Spheres</span>
                        <input type="range" id="ps-entities" min="1" max="256" step="1" value="${s.numEntities}">
                        <span class="slider-value" id="pv-entities">${s.numEntities}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">FOV</span>
                        <input type="range" id="ps-fov" min="30" max="120" step="1" value="${s.fov}">
                        <span class="slider-value" id="pv-fov">${s.fov}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Radius Min</span>
                        <input type="range" id="ps-radius-min" min="4" max="32" step="1" value="${s.entityRadiusMin}">
                        <span class="slider-value" id="pv-radius-min">${s.entityRadiusMin}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Radius Max</span>
                        <input type="range" id="ps-radius-max" min="4" max="32" step="1" value="${s.entityRadiusMax}">
                        <span class="slider-value" id="pv-radius-max">${s.entityRadiusMax}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Lights</span>
                        <input type="range" id="ps-lights" min="1" max="10" step="1" value="${s.nLights}">
                        <span class="slider-value" id="pv-lights">${s.nLights}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Grid W</span>
                        <input type="range" id="ps-w" min="32" max="512" step="8" value="${s.w}">
                        <span class="slider-value" id="pv-w">${s.w}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Grid H</span>
                        <input type="range" id="ps-h" min="32" max="512" step="8" value="${s.h}">
                        <span class="slider-value" id="pv-h">${s.h}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Grid D</span>
                        <input type="range" id="ps-d" min="32" max="512" step="8" value="${s.d}">
                        <span class="slider-value" id="pv-d">${s.d}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Shadow Dist</span>
                        <input type="range" id="ps-shadow-dist" min="16" max="256" step="8" value="${s.shadowCastDistance}">
                        <span class="slider-value" id="pv-shadow-dist">${s.shadowCastDistance}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">DPR cap</span>
                        <input type="range" id="ps-dpr" min="1" max="2" step="0.25" value="${s.maxDpr}">
                        <span class="slider-value" id="pv-dpr">${s.maxDpr}</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">PCF Taps</span>
                        <select id="ps-pcf">
                            <option value="1" ${s.shadowPcfTaps === 1 ? 'selected' : ''}>1 (fast)</option>
                            <option value="5" ${s.shadowPcfTaps === 5 ? 'selected' : ''}>5 (quality)</option>
                        </select>
                    </div>
                    <button id="custom-apply">Apply &amp; Restart</button>
                </div>`;
            document.body.appendChild(panel);

            // Live readouts
            ['entities','fov','radius-min','radius-max','lights','w','h','d','shadow-dist','dpr'].forEach(id => {
                const input = document.getElementById('ps-' + id);
                const display = document.getElementById('pv-' + id);
                input.addEventListener('input', () => { display.textContent = input.value; });
            });

            // Radius min/max constraint
            document.getElementById('ps-radius-min').addEventListener('input', () => {
                const minEl = document.getElementById('ps-radius-min');
                const maxEl = document.getElementById('ps-radius-max');
                if (parseInt(minEl.value) > parseInt(maxEl.value)) {
                    maxEl.value = minEl.value;
                    document.getElementById('pv-radius-max').textContent = maxEl.value;
                }
            });
            document.getElementById('ps-radius-max').addEventListener('input', () => {
                const minEl = document.getElementById('ps-radius-min');
                const maxEl = document.getElementById('ps-radius-max');
                if (parseInt(maxEl.value) < parseInt(minEl.value)) {
                    minEl.value = maxEl.value;
                    document.getElementById('pv-radius-min').textContent = minEl.value;
                }
            });

            // Collapse toggle
            document.getElementById('custom-panel-toggle').addEventListener('click', () => {
                const body = document.getElementById('custom-panel-body');
                const btn  = document.getElementById('custom-panel-toggle');
                body.classList.toggle('collapsed');
                btn.textContent = body.classList.contains('collapsed') ? '▸' : '▾';
            });

            // Apply & Restart
            document.getElementById('custom-apply').addEventListener('click', () => {
                sessionStorage.setItem('customSettings', JSON.stringify({
                    numEntities:        parseInt(document.getElementById('ps-entities').value),
                    fov:                parseInt(document.getElementById('ps-fov').value),
                    entityRadiusMin:    parseInt(document.getElementById('ps-radius-min').value),
                    entityRadiusMax:    parseInt(document.getElementById('ps-radius-max').value),
                    nLights:            parseInt(document.getElementById('ps-lights').value),
                    w:                  parseInt(document.getElementById('ps-w').value),
                    h:                  parseInt(document.getElementById('ps-h').value),
                    d:                  parseInt(document.getElementById('ps-d').value),
                    shadowCastDistance: parseInt(document.getElementById('ps-shadow-dist').value),
                    maxDpr:             parseFloat(document.getElementById('ps-dpr').value),
                    shadowPcfTaps:      parseInt(document.getElementById('ps-pcf').value)
                }));
                window.location.reload();
            });
        }

        // Set config and start demo
        import('./js/config.js').then(({ setConfig, setCustomConfig }) => {
            if (urlPreset === 'custom') {
                const stored = sessionStorage.getItem('customSettings');
                const settings = stored ? JSON.parse(stored) : DEFAULT_CUSTOM;
                setCustomConfig(settings);
            } else {
                setConfig(urlPreset);
            }
            return import('./js/main.js');
        });
    } else {
        // No preset in URL, show setup screen and handle selection
        const options = document.querySelectorAll('.quality-option');
        const startBtn = document.getElementById('start-btn');
        const setupScreen = document.getElementById('setup-screen');
        
        options.forEach(option => {
            option.addEventListener('click', () => {
                options.forEach(o => o.classList.remove('selected'));
                option.classList.add('selected');
                option.querySelector('input').checked = true;
            });
        });

        // Restore last selection if returning from demo
        const lastPreset = sessionStorage.getItem('lastPreset');
        if (lastPreset) {
            const target = document.querySelector(`[data-preset="${lastPreset}"]`);
            if (target) {
                options.forEach(o => o.classList.remove('selected'));
                target.classList.add('selected');
                target.querySelector('input').checked = true;
            }
        }

        const customSlidersEl = document.getElementById('custom-sliders');

        // Show/hide slider panel when Custom is selected
        options.forEach(option => {
            option.addEventListener('click', () => {
                customSlidersEl.classList.toggle('visible', option.dataset.preset === 'custom');
            });
        });

        // Live readouts for range inputs
        ['entities','fov','radius-min','radius-max','lights','w','h','d','shadow-dist','dpr'].forEach(id => {
            const input = document.getElementById('s-' + id);
            const display = document.getElementById('v-' + id);
            input.addEventListener('input', () => { display.textContent = input.value; });
        });

        // Radius min/max constraint
        document.getElementById('s-radius-min').addEventListener('input', () => {
            const minEl = document.getElementById('s-radius-min');
            const maxEl = document.getElementById('s-radius-max');
            if (parseInt(minEl.value) > parseInt(maxEl.value)) {
                maxEl.value = minEl.value;
                document.getElementById('v-radius-max').textContent = maxEl.value;
            }
        });
        document.getElementById('s-radius-max').addEventListener('input', () => {
            const minEl = document.getElementById('s-radius-min');
            const maxEl = document.getElementById('s-radius-max');
            if (parseInt(maxEl.value) < parseInt(minEl.value)) {
                minEl.value = maxEl.value;
                document.getElementById('v-radius-min').textContent = minEl.value;
            }
        });

        // If returning to custom, show panel and populate sliders
        if (lastPreset === 'custom') {
            customSlidersEl.classList.add('visible');
            const stored = sessionStorage.getItem('customSettings');
            if (stored) {
                const s = JSON.parse(stored);
                document.getElementById('s-entities').value    = s.numEntities;
                document.getElementById('s-fov').value         = s.fov;
                document.getElementById('s-radius-min').value  = s.entityRadiusMin;
                document.getElementById('s-radius-max').value  = s.entityRadiusMax;
                document.getElementById('s-lights').value      = s.nLights;
                document.getElementById('s-w').value           = s.w;
                document.getElementById('s-h').value           = s.h;
                document.getElementById('s-d').value           = s.d;
                document.getElementById('s-shadow-dist').value = s.shadowCastDistance;
                document.getElementById('s-dpr').value         = s.maxDpr;
                document.getElementById('s-pcf').value         = s.shadowPcfTaps;
                // Sync readouts after programmatic value set
                ['entities','fov','radius-min','radius-max','lights','w','h','d','shadow-dist','dpr'].forEach(id => {
                    document.getElementById('v-' + id).textContent =
                        document.getElementById('s-' + id).value;
                });
            }
        }

        startBtn.addEventListener('click', () => {
            const selectedPreset = document.querySelector('input[name="quality"]:checked').value;
            if (selectedPreset === 'custom') {
                sessionStorage.setItem('customSettings', JSON.stringify({
                    numEntities:        parseInt(document.getElementById('s-entities').value),
                    fov:                parseInt(document.getElementById('s-fov').value),
                    entityRadiusMin:    parseInt(document.getElementById('s-radius-min').value),
                    entityRadiusMax:    parseInt(document.getElementById('s-radius-max').value),
                    nLights:            parseInt(document.getElementById('s-lights').value),
                    w:                  parseInt(document.getElementById('s-w').value),
                    h:                  parseInt(document.getElementById('s-h').value),
                    d:                  parseInt(document.getElementById('s-d').value),
                    shadowCastDistance: parseInt(document.getElementById('s-shadow-dist').value),
                    maxDpr:             parseFloat(document.getElementById('s-dpr').value),
                    shadowPcfTaps:      parseInt(document.getElementById('s-pcf').value)
                }));
            }
            window.location.hash = selectedPreset;
            window.location.reload();
        });
    }
    
    // Back button handler
    const backBtn = document.getElementById('back-btn');
    if (backBtn) {
        backBtn.addEventListener('click', () => {
            sessionStorage.setItem('lastPreset', window.location.hash.slice(1));
            window.location.hash = '';
            window.location.reload();
        });
    }
</script>
</body>
</html>
