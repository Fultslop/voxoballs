<!DOCTYPE html>
<html>
<head>
    <title>Three.js 4M Voxel Raymarcher</title>
    <style> body { margin: 0; overflow: hidden; background: #000; } </style>
</head>
<body>
<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/** 1. CONFIG & DATA **/
const W = 320, H = 200, D = 128;
const totalVoxels = W * H * D;
const numEntities = 64;
const ballRadius = 6; // 32x32x32 bounding area approximately

// The Voxel Grid (1 byte per voxel)
const voxelData = new Uint8Array(totalVoxels);
const dataTexture = new THREE.Data3DTexture(voxelData, W, H, D);
dataTexture.format = THREE.RedFormat;
dataTexture.minFilter = THREE.NearestFilter;
dataTexture.magFilter = THREE.NearestFilter;

// Simple 256 Color Palette (stored as a 256x1 texture)
const paletteData = new Uint8Array(256 * 4);
for(let i=0; i<256; i++) {
    paletteData[i*4]   = Math.random() * 255; // R
    paletteData[i*4+1] = Math.random() * 255; // G
    paletteData[i*4+2] = Math.random() * 255; // B
    paletteData[i*4+3] = 255;                 // A
}
const paletteTexture = new THREE.DataTexture(paletteData, 256, 1, THREE.RGBAFormat);
paletteTexture.needsUpdate = true;

/** 2. ENTITY LOGIC **/
const entities = Array.from({ length: numEntities }, () => ({
    pos: new THREE.Vector3(Math.random()*W, Math.random()*H, Math.random()*D),
    vel: new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2),
    color: Math.floor(Math.random() * 254) + 1,
    size: Math.floor(Math.random() * (24 - 4 + 1)) + 4
}));

/** 3. SHADER MATERIAL (The Engine) **/
const vertexShader = `
    out vec3 vOrigin;
    out vec3 vDirection;
    void main() {
        vOrigin = vec3(inverse(modelMatrix) * vec4(cameraPosition, 1.0));
        vDirection = position - vOrigin;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
`;

const fragmentShader = `
    precision highp float;
    precision highp sampler3D;

    in vec3 vOrigin;
    in vec3 vDirection;

    out vec4 fragColor;

    uniform sampler3D uData;
    uniform sampler2D uPalette;
    uniform vec3 uLightPos[3];
    uniform vec3 uVolumeSize;

    vec2 rayBoxIntersection(vec3 ro, vec3 rd, vec3 boxMin, vec3 boxMax) {
        vec3 t0 = (boxMin - ro) / rd;
        vec3 t1 = (boxMax - ro) / rd;
        vec3 tmin = min(t0, t1);
        vec3 tmax = max(t0, t1);
        float fmin = max(max(tmin.x, tmin.y), tmin.z);
        float fmax = min(min(tmax.x, tmax.y), tmax.z);
        return vec2(fmin, fmax);
    }

    void main() {
        vec3 rayDir = normalize(vDirection);
        vec2 bounds = rayBoxIntersection(vOrigin, rayDir, vec3(0.0), uVolumeSize);
        if (bounds.x > bounds.y) discard;

        float t = max(bounds.x, 0.0);
        vec3 color = vec3(0.0);
        bool hit = false;

        for (int i = 0; i < 1024; i++) { // Raymarching steps
            vec3 p = vOrigin + rayDir * t;
            if (any(greaterThan(p, uVolumeSize)) || any(lessThan(p, vec3(0.0)))) break;

            float val = texture(uData, p / uVolumeSize).r;
            if (val > 0.0) {
                // Surface Hit
                vec3 baseColor = texture(uPalette, vec2(val, 0.5)).rgb;
                
                // Outward normal: gradient of occupancy points inward (high→low), so negate it
                vec3 eps = vec3(1.0, 0.0, 0.0);
                #define occ(pos) (texture(uData, (pos)/uVolumeSize).r > 0.0 ? 1.0 : 0.0)
                vec3 grad = vec3(
                    occ(p+eps.xyy) - occ(p-eps.xyy),
                    occ(p+eps.yxy) - occ(p-eps.yxy),
                    occ(p+eps.yyx) - occ(p-eps.yyx)
                );
                // Fallback to -rayDir when deep inside a ball (all neighbors occupied, gradient = 0)
                vec3 normal = dot(grad, grad) > 0.0 ? normalize(-grad) : -rayDir;

                // 3-Point Lighting + camera fill
                vec3 lightTotal = vec3(0.1); // Ambient
                for(int l=0; l<3; l++) {
                    vec3 lDir = normalize(uLightPos[l] - p);
                    lightTotal += max(dot(normal, lDir), 0.0) * 0.6;
                }
                // Fill light from camera direction: far-side surfaces facing the camera are always lit
                lightTotal += max(dot(normal, -rayDir), 0.0) * 0.5;
                
                color = baseColor * lightTotal;
                hit = true;
                break;
            }
            t += 0.5; // Step size of 0.5 voxel to avoid skipping surface voxels
            if (t > bounds.y) break;
        }

        if (!hit) discard;
        fragColor = vec4(color, 1.0);
    }
`;

/** 4. SCENE SETUP **/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(W, H, D*3);
camera.lookAt(W/2, H/2, D/2);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const boxGeom = new THREE.BoxGeometry(W, H, D);
boxGeom.translate(W/2, H/2, D/2); // Align with data coordinates
const mesh = new THREE.Mesh(boxGeom, new THREE.ShaderMaterial({
    uniforms: {
        uData: { value: dataTexture },
        uPalette: { value: paletteTexture },
        uVolumeSize: { value: new THREE.Vector3(W, H, D) },
        uLightPos: { value: [new THREE.Vector3(0,0,0), new THREE.Vector3(W,H,0), new THREE.Vector3(W/2,H/2,D*2)] }
    },
    vertexShader, fragmentShader,
    side: THREE.DoubleSide, // Render both sides so coverage is correct when camera enters the volume
    transparent: true,
    glslVersion: THREE.GLSL3
}));
scene.add(mesh);

/** 5. MAIN LOOP **/
function updateGrid() {
    voxelData.fill(0); // Clear the "screen"
    
    entities.forEach(e => {
        // Move
        e.pos.add(e.vel);
        if (e.pos.x < e.size || e.pos.x > (W - e.size)) e.vel.x *= -1;
        if (e.pos.y < e.size || e.pos.y > (H - e.size)) e.vel.y *= -1;
        if (e.pos.z < e.size || e.pos.z > (D - e.size)) e.vel.z *= -1;

        // Draw Ball into Voxel Data (32x32x32 loop approx)
        let r = e.size; 
        for(let x=-r; x<r; x++) {
            for(let y=-r; y<r; y++) {
                for(let z=-r; z<r; z++) {
                    if(x*x + y*y + z*z < r*r) {
                        let vx = Math.floor(e.pos.x + x);
                        let vy = Math.floor(e.pos.y + y);
                        let vz = Math.floor(e.pos.z + z);
                        if(vx >= 0 && vx < W && vy >= 0 && vy < H && vz >= 0 && vz < D) {
                            voxelData[vx + (vy * W) + (vz * W * H)] = e.color;
                        }
                    }
                }
            }
        }
    });
    dataTexture.needsUpdate = true;
}

/** 5b. FPS CAMERA CONTROLS **/
let yaw = 0, pitch = 0;
const keys = {};
const MOVE_SPEED = 2;

// Click canvas to lock pointer
renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());

document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement === renderer.domElement) {
        document.addEventListener('mousemove', onMouseMove);
    } else {
        document.removeEventListener('mousemove', onMouseMove);
    }
});

function onMouseMove(e) {
    yaw   -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch  = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, pitch));
}

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// HUD overlay
const hud = document.createElement('div');
hud.style.cssText = 'position:fixed;top:8px;left:8px;color:#0f0;font:13px monospace;pointer-events:none;white-space:pre;text-shadow:0 0 4px #000';
document.body.appendChild(hud);

function updateCamera() {
    // Build look direction from yaw/pitch
    const dir = new THREE.Vector3(
        Math.sin(yaw) * Math.cos(pitch),
        Math.sin(pitch),
        Math.cos(yaw) * Math.cos(pitch)
    );
    // Strafe vector (right)
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

    if (keys['KeyW'] || keys['ArrowUp'])    camera.position.addScaledVector(dir,   MOVE_SPEED);
    if (keys['KeyS'] || keys['ArrowDown'])  camera.position.addScaledVector(dir,  -MOVE_SPEED);
    if (keys['KeyA'] || keys['ArrowLeft'])  camera.position.addScaledVector(right,-MOVE_SPEED);
    if (keys['KeyD'] || keys['ArrowRight']) camera.position.addScaledVector(right, MOVE_SPEED);

    camera.lookAt(camera.position.clone().add(dir));

    const p = camera.position;
    const yawDeg   = ((yaw   * 180 / Math.PI) % 360).toFixed(1);
    const pitchDeg = ( pitch * 180 / Math.PI        ).toFixed(1);
    hud.textContent =
        `pos   x:${p.x.toFixed(1)}  y:${p.y.toFixed(1)}  z:${p.z.toFixed(1)}\n` +
        `yaw:${yawDeg}°  pitch:${pitchDeg}°\n` +
        `[click to capture mouse  |  WASD to move]`;
}

function animate() {
    updateGrid();
    updateCamera();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});

animate();
</script>
</body>
</html>
