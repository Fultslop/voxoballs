<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e"/>

  <!-- LEFT: Sphere of directions around point light -->
  <!-- Sphere outline -->
  <circle cx="180" cy="200" r="120" fill="none" stroke="#4fc3f7" stroke-width="2"/>
  <!-- Point light at center -->
  <circle cx="180" cy="200" r="8" fill="#ffcc00"/>
  <text x="180" y="215" font-family="sans-serif" font-size="12" fill="#ffcc00" text-anchor="middle">light</text>

  <!-- Several rays in different directions -->
  <line x1="180" y1="200" x2="300" y2="200" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="180" y1="200" x2="268" y2="116" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="180" y1="200" x2="180" y2="80" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="180" y1="200" x2="92"  y2="116" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="180" y1="200" x2="60"  y2="200" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="180" y1="200" x2="92"  y2="284" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="180" y1="200" x2="180" y2="320" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="180" y1="200" x2="268" y2="284" stroke="#ff9800" stroke-width="1.5"/>

  <!-- Dots on sphere surface for each ray -->
  <circle cx="300" cy="200" r="4" fill="#ff9800"/>
  <circle cx="268" cy="116" r="4" fill="#ff9800"/>
  <circle cx="180" cy="80"  r="4" fill="#ff9800"/>
  <circle cx="92"  cy="116" r="4" fill="#ff9800"/>
  <circle cx="60"  cy="200" r="4" fill="#ff9800"/>
  <circle cx="92"  cy="284" r="4" fill="#ff9800"/>
  <circle cx="180" cy="320" r="4" fill="#ff9800"/>
  <circle cx="268" cy="284" r="4" fill="#ff9800"/>

  <!-- Equator and poles labels -->
  <line x1="60" y1="200" x2="300" y2="200" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="180" y="360" font-family="sans-serif" font-size="13" fill="#4fc3f7" text-anchor="middle">sphere of directions</text>

  <!-- Arrow to right panel -->
  <text x="350" y="205" font-family="sans-serif" font-size="22" fill="#ffffff" text-anchor="middle">→</text>
  <text x="350" y="225" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">unwrap</text>

  <!-- RIGHT: Equirectangular flat map (2:1 aspect) -->
  <rect x="420" y="100" width="340" height="170" fill="#0d0d1f" stroke="#4fc3f7" stroke-width="2"/>

  <!-- Grid lines on map -->
  <line x1="420" y1="185" x2="760" y2="185" stroke="#4fc3f7" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <!-- Vertical meridians -->
  <line x1="505" y1="100" x2="505" y2="270" stroke="#4fc3f7" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>
  <line x1="590" y1="100" x2="590" y2="270" stroke="#4fc3f7" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>
  <line x1="675" y1="100" x2="675" y2="270" stroke="#4fc3f7" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>

  <!-- Dots representing sampled directions on map -->
  <circle cx="760" cy="185" r="4" fill="#ff9800"/>
  <circle cx="675" cy="134" r="4" fill="#ff9800"/>
  <circle cx="590" cy="100" r="4" fill="#ff9800"/>
  <circle cx="505" cy="134" r="4" fill="#ff9800"/>
  <circle cx="420" cy="185" r="4" fill="#ff9800"/>
  <circle cx="505" cy="236" r="4" fill="#ff9800"/>
  <circle cx="590" cy="270" r="4" fill="#ff9800"/>
  <circle cx="675" cy="236" r="4" fill="#ff9800"/>

  <!-- Labels -->
  <text x="590" y="92" font-family="sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">top (θ=+90°)</text>
  <text x="590" y="285" font-family="sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">bottom (θ=−90°)</text>
  <text x="416" y="185" font-family="sans-serif" font-size="11" fill="#ffffff" text-anchor="end">φ=−π</text>
  <text x="764" y="185" font-family="sans-serif" font-size="11" fill="#ffffff">φ=+π</text>

  <!-- U/V axes -->
  <text x="590" y="300" font-family="sans-serif" font-size="12" fill="#4fc3f7" text-anchor="middle">U: longitude (φ)      V: latitude (θ)</text>
  <text x="590" y="360" font-family="sans-serif" font-size="12" fill="#888" text-anchor="middle">1024 × 512 px  (2:1 ratio)</text>

  <!-- Formula box -->
  <rect x="420" y="310" width="340" height="60" fill="#0d0d1f" stroke="#333" rx="4"/>
  <text x="430" y="330" font-family="monospace" font-size="11" fill="#4fc3f7">u = atan(x, z) / (2π) + 0.5</text>
  <text x="430" y="350" font-family="monospace" font-size="11" fill="#ff9800">v = asin(y)   / π    + 0.5</text>

  <!-- Title -->
  <text x="400" y="390" font-family="sans-serif" font-size="13" fill="#888" text-anchor="middle">Equirectangular Shadow Map Projection</text>
</svg>
