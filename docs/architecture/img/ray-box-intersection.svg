<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e"/>

  <!-- Box -->
  <rect x="280" y="80" width="300" height="240" fill="none" stroke="#4fc3f7" stroke-width="2"/>

  <!-- Ray (from outside, through box) -->
  <!-- Ray origin at (60, 340), direction toward upper right, hitting box -->
  <!-- tN at (280, 200), tF at (580, 56) approx -->
  <line x1="60" y1="340" x2="730" y2="50" stroke="#ff9800" stroke-width="2" stroke-dasharray="none"/>
  <!-- Arrow tip -->
  <polygon points="730,50 715,62 722,47" fill="#ff9800"/>

  <!-- tN marker (entry) -->
  <!-- Ray hits left face at ~(280, 196) -->
  <circle cx="280" cy="196" r="6" fill="#4fc3f7"/>
  <line x1="280" y1="196" x2="280" y2="240" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="240" y="255" font-family="sans-serif" font-size="14" fill="#4fc3f7">tN (entry)</text>

  <!-- tF marker (exit) -->
  <!-- Ray exits top face at ~(454, 80) -->
  <circle cx="454" cy="80" r="6" fill="#4fc3f7"/>
  <line x1="454" y1="80" x2="454" y2="130" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="125" font-family="sans-serif" font-size="14" fill="#4fc3f7">tF (exit)</text>

  <!-- Labels -->
  <text x="40" y="355" font-family="sans-serif" font-size="14" fill="#ffffff">ray origin</text>
  <text x="320" y="170" font-family="sans-serif" font-size="13" fill="#ffffff">voxel volume</text>

  <!-- Slab annotations -->
  <!-- Left slab -->
  <line x1="280" y1="30" x2="280" y2="70" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="260" y="25" font-family="sans-serif" font-size="12" fill="#4fc3f7">x = bmin.x</text>
  <!-- Right slab -->
  <line x1="580" y1="30" x2="580" y2="70" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="545" y="25" font-family="sans-serif" font-size="12" fill="#4fc3f7">x = bmax.x</text>

  <!-- Title -->
  <text x="400" y="385" font-family="sans-serif" font-size="13" fill="#888" text-anchor="middle">Ray–Box Intersection (Slab Method)</text>

  <!-- Formula area -->
  <rect x="590" y="200" width="190" height="100" fill="#0d0d1f" stroke="#333" stroke-width="1" rx="4"/>
  <text x="600" y="220" font-family="monospace" font-size="12" fill="#4fc3f7">t0 = (bmin - ro) / rd</text>
  <text x="600" y="238" font-family="monospace" font-size="12" fill="#4fc3f7">t1 = (bmax - ro) / rd</text>
  <text x="600" y="262" font-family="monospace" font-size="12" fill="#ff9800">tN = max(min(t0,t1))</text>
  <text x="600" y="280" font-family="monospace" font-size="12" fill="#ff9800">tF = min(max(t0,t1))</text>
  <text x="600" y="298" font-family="monospace" font-size="12" fill="#f44336">miss if tN &gt; tF</text>
</svg>
