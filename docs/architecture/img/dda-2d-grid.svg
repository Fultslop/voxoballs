<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e"/>

  <!-- Grid (7 columns x 5 rows, cell size 80px, origin at 80,40) -->
  <!-- Grid lines -->
  <!-- Vertical lines: x = 80, 160, 240, 320, 400, 480, 560, 640 -->
  <line x1="80"  y1="40" x2="80"  y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="40" x2="160" y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="40" x2="240" y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="40" x2="320" y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="40" x2="400" y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="480" y1="40" x2="480" y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="560" y1="40" x2="560" y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="640" y1="40" x2="640" y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <!-- Horizontal lines: y = 40, 120, 200, 280, 360 -->
  <line x1="80" y1="40"  x2="640" y2="40"  stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="120" x2="640" y2="120" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="200" x2="640" y2="200" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="280" x2="640" y2="280" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="360" x2="640" y2="360" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>

  <!-- Visited cells (highlighted) -->
  <rect x="80"  y="280" width="80" height="80" fill="#4fc3f7" opacity="0.15"/>
  <rect x="160" y="200" width="80" height="80" fill="#4fc3f7" opacity="0.15"/>
  <rect x="240" y="200" width="80" height="80" fill="#4fc3f7" opacity="0.15"/>
  <rect x="320" y="120" width="80" height="80" fill="#4fc3f7" opacity="0.15"/>
  <rect x="400" y="120" width="80" height="80" fill="#4fc3f7" opacity="0.15"/>

  <!-- Hit cell (solid) -->
  <rect x="480" y="40" width="80" height="80" fill="#f44336" opacity="0.6"/>
  <text x="520" y="85" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">HIT</text>

  <!-- Ray line: from bottom-left through visited cells to hit -->
  <line x1="90" y1="350" x2="540" y2="55" stroke="#ff9800" stroke-width="2"/>
  <polygon points="540,55 525,68 532,53" fill="#ff9800"/>

  <!-- Step markers on cell boundaries -->
  <circle cx="160" cy="270" r="4" fill="#ff9800"/>
  <circle cx="240" cy="213" r="4" fill="#ff9800"/>
  <circle cx="320" cy="183" r="4" fill="#ff9800"/>
  <!-- No step needed before hit -->

  <!-- Step labels -->
  <text x="140" y="265" font-family="sans-serif" font-size="11" fill="#ff9800">step 1</text>
  <text x="247" y="210" font-family="sans-serif" font-size="11" fill="#ff9800">step 2</text>
  <text x="325" y="178" font-family="sans-serif" font-size="11" fill="#ff9800">step 3</text>

  <!-- Ray origin label -->
  <text x="55" y="370" font-family="sans-serif" font-size="13" fill="#ffffff">origin</text>

  <!-- Axes -->
  <text x="82" y="390" font-family="sans-serif" font-size="12" fill="#4fc3f7">X →</text>
  <text x="20" y="200" font-family="sans-serif" font-size="12" fill="#4fc3f7" transform="rotate(-90,20,200)">Y ↑</text>

  <!-- Title -->
  <text x="400" y="395" font-family="sans-serif" font-size="13" fill="#888" text-anchor="middle">DDA: Ray Stepping Through a 2D Grid (Bird's-Eye View)</text>
</svg>
