<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e"/>

  <!-- Ground plane suggestion -->
  <line x1="50" y1="310" x2="750" y2="310" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- Blocking voxel -->
  <rect x="280" y="230" width="50" height="80" fill="#4fc3f7" opacity="0.7"/>
  <text x="305" y="225" font-family="sans-serif" font-size="12" fill="#4fc3f7" text-anchor="middle">blocker</text>

  <!-- Point light (top left) -->
  <circle cx="120" cy="100" r="14" fill="#ffcc00" opacity="0.95"/>
  <text x="120" y="75" font-family="sans-serif" font-size="13" fill="#ffcc00" text-anchor="middle">light</text>
  <!-- Light rays emanating -->
  <line x1="134" y1="100" x2="280" y2="230" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <!-- Blocked ray continues in shadow color after blocker -->
  <line x1="330" y1="266" x2="520" y2="310" stroke="#f44336" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Shadow area on ground -->
  <rect x="330" y="298" width="190" height="12" fill="#f44336" opacity="0.25" rx="2"/>
  <text x="425" y="335" font-family="sans-serif" font-size="12" fill="#f44336" text-anchor="middle">shadow</text>

  <!-- Unblocked ray -->
  <line x1="134" y1="100" x2="600" y2="310" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Surface point A (lit) -->
  <circle cx="600" cy="310" r="6" fill="#ff9800"/>
  <text x="600" y="330" font-family="sans-serif" font-size="12" fill="#ff9800" text-anchor="middle">lit surface</text>

  <!-- Surface point B (in shadow) -->
  <circle cx="450" cy="310" r="6" fill="#888"/>
  <text x="450" y="330" font-family="sans-serif" font-size="12" fill="#888" text-anchor="middle">shadowed</text>

  <!-- Comparison box -->
  <rect x="530" y="60" width="240" height="130" fill="#0d0d1f" stroke="#333" rx="4"/>
  <text x="650" y="82" font-family="sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Shadow lookup</text>
  <line x1="540" y1="90" x2="760" y2="90" stroke="#333" stroke-width="1"/>
  <text x="540" y="110" font-family="monospace" font-size="11" fill="#4fc3f7">stored  = shadowMap.r</text>
  <text x="540" y="128" font-family="monospace" font-size="11" fill="#ff9800">actual  = dist(light, surface)</text>
  <line x1="540" y1="138" x2="760" y2="138" stroke="#333" stroke-width="1"/>
  <text x="540" y="158" font-family="monospace" font-size="11" fill="#ffffff">if actual &gt; stored + bias:</text>
  <text x="548" y="176" font-family="monospace" font-size="11" fill="#f44336">  → in shadow</text>
  <text x="548" y="194" font-family="sans-serif" font-size="11" fill="#888">  (something closer was seen)</text>

  <!-- Two-pass label -->
  <text x="120" y="380" font-family="sans-serif" font-size="12" fill="#4fc3f7">Pass 1: render from light → store distances</text>
  <text x="120" y="396" font-family="sans-serif" font-size="12" fill="#ff9800">Pass 2: shade surface → compare distances</text>

  <!-- Title -->
  <text x="400" y="20" font-family="sans-serif" font-size="13" fill="#888" text-anchor="middle">Shadow Mapping Overview</text>
</svg>
