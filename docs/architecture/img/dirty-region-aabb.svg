<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e"/>

  <!-- Full voxel grid (shown as 2D cross-section) -->
  <!-- Grid: 14 cols × 10 rows, cell=40px, origin=(30,20) -->

  <!-- Background grid cells (empty) -->
  <!-- Draw full grid outline first -->
  <rect x="30" y="20" width="560" height="360" fill="#0d0d1f" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Grid lines (every 40px) -->
  <!-- Vertical -->
  <line x1="70"  y1="20" x2="70"  y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="110" y1="20" x2="110" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="20" x2="150" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="190" y1="20" x2="190" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="230" y1="20" x2="230" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="270" y1="20" x2="270" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="310" y1="20" x2="310" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="350" y1="20" x2="350" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="390" y1="20" x2="390" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="430" y1="20" x2="430" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="470" y1="20" x2="470" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="510" y1="20" x2="510" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="550" y1="20" x2="550" y2="380" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <!-- Horizontal -->
  <line x1="30" y1="60"  x2="590" y2="60"  stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="100" x2="590" y2="100" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="140" x2="590" y2="140" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="180" x2="590" y2="180" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="220" x2="590" y2="220" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="260" x2="590" y2="260" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="300" x2="590" y2="300" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="340" x2="590" y2="340" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>

  <!-- Wall voxels (border row/col) -->
  <!-- Top row -->
  <rect x="30" y="20" width="560" height="40" fill="#4fc3f7" opacity="0.25"/>
  <!-- Bottom row -->
  <rect x="30" y="340" width="560" height="40" fill="#4fc3f7" opacity="0.25"/>
  <!-- Left col -->
  <rect x="30" y="20" width="40" height="360" fill="#4fc3f7" opacity="0.25"/>
  <!-- Right col -->
  <rect x="550" y="20" width="40" height="360" fill="#4fc3f7" opacity="0.25"/>
  <text x="310" y="45" font-family="sans-serif" font-size="11" fill="#4fc3f7" text-anchor="middle" opacity="0.8">walls (index 255)</text>

  <!-- Sphere A (old position) — a circle-ish blob of cells -->
  <rect x="150" y="140" width="80" height="80" fill="#ff9800" opacity="0.35" rx="3"/>
  <text x="190" y="185" font-family="sans-serif" font-size="11" fill="#ff9800" text-anchor="middle">sphere A</text>
  <text x="190" y="198" font-family="sans-serif" font-size="10" fill="#ff9800" text-anchor="middle">(prev pos)</text>

  <!-- Sphere B (new position) — adjacent, moved right/down -->
  <rect x="310" y="180" width="80" height="80" fill="#ff9800" opacity="0.6" rx="3"/>
  <text x="350" y="223" font-family="sans-serif" font-size="11" fill="#ff9800" text-anchor="middle">sphere A</text>
  <text x="350" y="236" font-family="sans-serif" font-size="10" fill="#ff9800" text-anchor="middle">(new pos)</text>

  <!-- Movement arrow -->
  <line x1="230" y1="180" x2="305" y2="200" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="305,200 291,192 292,205" fill="#ff9800"/>

  <!-- Dirty AABB (union of old+new bounds) -->
  <rect x="150" y="140" width="240" height="120" fill="none" stroke="#f44336" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- AABB corner labels -->
  <circle cx="150" cy="140" r="4" fill="#f44336"/>
  <text x="100" y="133" font-family="monospace" font-size="11" fill="#f44336">minX,minY</text>
  <circle cx="390" cy="260" r="4" fill="#f44336"/>
  <text x="395" y="272" font-family="monospace" font-size="11" fill="#f44336">maxX,maxY</text>

  <!-- AABB label -->
  <text x="270" y="132" font-family="sans-serif" font-size="13" fill="#f44336" text-anchor="middle">dirty AABB (upload region)</text>

  <!-- Right panel: explanation -->
  <rect x="620" y="30" width="165" height="240" fill="#0d0d1f" stroke="#333" rx="4"/>
  <text x="703" y="52" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Per frame</text>
  <line x1="630" y1="58" x2="775" y2="58" stroke="#333" stroke-width="1"/>
  <text x="630" y="76" font-family="sans-serif" font-size="11" fill="#4fc3f7">1. clearRegion(prev)</text>
  <text x="630" y="96" font-family="sans-serif" font-size="11" fill="#ff9800">2. move sphere</text>
  <text x="630" y="116" font-family="sans-serif" font-size="11" fill="#ff9800">3. stampSphere(new)</text>
  <text x="630" y="136" font-family="sans-serif" font-size="11" fill="#f44336">4. union AABBs</text>
  <text x="630" y="156" font-family="sans-serif" font-size="11" fill="#f44336">5. upload dirty rect</text>
  <line x1="630" y1="168" x2="775" y2="168" stroke="#333" stroke-width="1"/>
  <text x="703" y="186" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">upload only</text>
  <text x="703" y="202" font-family="monospace" font-size="11" fill="#f44336" text-anchor="middle">w × h × d</text>
  <text x="703" y="218" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">not the full</text>
  <text x="703" y="234" font-family="monospace" font-size="11" fill="#4fc3f7" text-anchor="middle">W × H × D</text>
  <text x="703" y="256" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">texSubImage3D</text>

  <!-- Title -->
  <text x="400" y="396" font-family="sans-serif" font-size="13" fill="#888" text-anchor="middle">Dirty Region AABB — Only Changed Voxels Are Re-uploaded</text>
</svg>
