workflow:
  name: mobile-perf-optimizer
  description: "Enforces 30fps Android targets and hierarchical optimization steps."
  version: "1.0"

  runtime:
    provider: "claude" # 2026 literal: must be 'claude', 'openai-agents', or 'copilot'
    model: "claude-3-5-sonnet-latest"

  orchestration:
    entry_point: "analyzer"

  agents:
    - name: "analyzer"
      instructions: |
        You are a Lead Graphics Engineer. 
        GOAL: Reach 30fps on Mid-quality Android.
        
        ORDER OF EFFORT:
        1. DPR Capping (Check scene.js onResize). 
           Check pixel ratio first — `setPixelRatio` is only called in `onResize` in scene.js; if the phone fires resize and jumps to DPR=2, rendering 4x pixels. Fix: cap DPR at 1 for mid on mobile. 
           Expect Potentially 2-4x gain alone.
        2. Shadow PCF reduction (Check shadows in config.js)
           Reduce from 5-tap to 1-tap on mid preset. Expect ~10-15% gain.
        3. Grid Resizing (Check mid-preset in config.js)
           Reduce mid grid to 96³ — from 128³, cuts DDA steps by ~25%. Tweak preset in config.js.
        4. Hierarchical DDA / empty-space skipping — complex, but 2-3x gain in sparse scenes. Last resort.
        
        TASK: Analyze the current files and identify which steps are missing.
      output:
        type: "object"
        properties:
          gap_analysis:
            type: "string" # The error was here: 'type' must be a child of 'gap_analysis'
        required: ["gap_analysis"]
      routes:
        - to: "planner"

    - name: "planner"
      instructions: |
        Create an Implementation Plan based on the gaps: {{ analyzer.output.gap_analysis }}
        STRICT: Do not suggest Hierarchical DDA unless steps 1-3 are done.
      routes:
        - to: "$human_approval" 

    - name: "coder"
      instructions: |
        Execute the plan. Focus ONLY on 'mid' quality in config.js and scene.js.
        Target: 30fps Android.
      routes:
        - to: "$end"